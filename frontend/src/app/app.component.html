<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="brand-logo"><img src="assets/econet-ai-logo.png" alt="Econet ai" /></div>
      <div class="brand-title">Recognyze</div>
    </div>

    <nav class="side-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>home</mat-icon><span>Home</span>
      </a>
      <a routerLink="/recognize" routerLinkActive="active">
        <mat-icon>volunteer_activism</mat-icon><span>Recognise</span>
      </a>
      <a routerLink="/wall" routerLinkActive="active">
        <mat-icon>dynamic_feed</mat-icon><span>Wall</span>
      </a>
      <a routerLink="/profile" routerLinkActive="active">
        <mat-icon>person</mat-icon><span>My Profile</span>
      </a>
      <a routerLink="/leaderboard" routerLinkActive="active">
        <mat-icon>leaderboard</mat-icon><span>Leaderboard</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="footer-controls">
        <button mat-icon-button (click)="toggleTheme()" [matTooltip]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
          <mat-icon>{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</mat-icon>
        </button>
        <button mat-icon-button (click)="toggleSound(!soundEnabled)" [matTooltip]="soundEnabled ? 'Mute celebration sound' : 'Enable celebration sound'">
          <mat-icon>{{ soundEnabled ? 'volume_up' : 'volume_off' }}</mat-icon>
        </button>
      </div>
      <div class="user-pill" *ngIf="profile">
        <img [src]="profile.photoUrl" alt="Profile" />
        <div class="name">{{ profile.displayName }}</div>
      </div>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
